<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biblioteca Digitale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@300;400;600;800&display=swap');

:root {
  --bg-space: #02040a;
  --nebula-purp: rgba(76, 29, 149, 0.32);
  --nebula-blue: rgba(30, 58, 138, 0.28);
  --star-white: #ffffff;
  --accent-cyan: #22d3ee;
  --accent-violet: #8b5cf6;
  --glow-core: rgba(34, 211, 238, 0.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow-x: hidden; background: var(--bg-space); }

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
  background:
    radial-gradient(circle at 50% 50%, var(--nebula-purp), transparent 60%),
    radial-gradient(circle at 20% 30%, var(--nebula-blue), transparent 50%),
    var(--bg-space);
}

#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.interface {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}

.header {
  padding: 36px 26px 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}

.title-with-phi {
  display: flex;
  align-items: center;
  gap: 15px;
}

.phi-symbol {
  font-family: 'Cinzel', serif;
  font-size: 3rem;
  font-weight: 900;
  background: linear-gradient(to bottom, #ffffff, #d7f6ff, #7dd3fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 15px rgba(34, 211, 238, 0.35);
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: linear-gradient(to bottom, #ffffff, #d7f6ff, #7dd3fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.header-logo {
  position: fixed;
  top: 20px;
  right: 24px;
  width: 140px;
  height: auto;
  opacity: 0.92;
  z-index: 12;
  pointer-events: none;
}

.star-map {
  position: relative;
  flex-grow: 1;
  width: 100%;
  pointer-events: auto;
  min-height: 760px;
}

#linksSvg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.connector {
  fill: none;
  stroke-width: 1.2;
  stroke-opacity: 0.22;
}

.energy-flow {
  fill: none;
  stroke-width: 2.5;
  stroke-dasharray: 4, 18;
  animation: orbit-flow 5s linear infinite;
  filter: blur(0.5px);
}

@keyframes orbit-flow {
  from { stroke-dashoffset: 100; }
  to { stroke-dashoffset: 0; }
}

.node {
  position: absolute;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.05);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 5;
}

.node:hover {
  transform: translate(-50%, -50%) scale(1.15);
  border-color: #fff;
  box-shadow: 0 0 30px rgba(255,255,255,0.3);
  z-index: 10;
}

.node span {
  font-size: 0.62rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  text-align: center;
  color: rgba(255,255,255,0.82);
  padding: 0 3px;
  line-height: 1.05;
  max-width: 120px;
  white-space: normal;
  overflow: visible;
}

.node:hover span { color: var(--accent-cyan); }

.core-pair {
  position: absolute;
  width: 190px;
  height: 104px;
  transform: translate(-50%, -50%);
  z-index: 6;
}

.core-bridge {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 54px;
  height: 14px;
  transform: translate(-50%, -50%);
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(34, 211, 238, 0.22), rgba(139, 92, 246, 0.22));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 16px rgba(34, 211, 238, 0.16);
}

.core-node {
  position: absolute;
  top: 50%;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  background: radial-gradient(circle, rgba(34, 211, 238, 0.12), rgba(255,255,255,0.03));
  border: 2px solid var(--accent-cyan);
  backdrop-filter: blur(9px);
  box-shadow: 0 0 26px rgba(34, 211, 238, 0.18), inset 0 0 12px rgba(34, 211, 238, 0.08);
  transition: all 0.45s ease;
}

.core-node.left { left: 0; transform: translateY(-50%); }
.core-node.right { right: 0; transform: translateY(-50%); }

.core-node:hover {
  transform: translateY(-50%) scale(1.08);
  box-shadow: 0 0 34px var(--glow-core), inset 0 0 18px rgba(34, 211, 238, 0.14);
}

.core-node span {
  font-size: 0.72rem;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1.1px;
  text-align: center;
  color: #fff;
  text-shadow: 0 0 10px var(--accent-cyan);
  padding: 0 6px;
  line-height: 1.1;
}

@keyframes float {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -12px; }
}

.node {
  animation: float 6s ease-in-out infinite;
  animation-delay: var(--d);
}

@media (max-width: 900px) {
  .header { padding-top: 24px; }
  .phi-symbol { font-size: 2.2rem; }
  .header h1 { font-size: 1.35rem; letter-spacing: 0.22em; }
  .header-logo { width: 104px; top: 14px; right: 14px; }
  .star-map { min-height: 980px; }
  .node { width: 68px; height: 68px; }
  .node span { font-size: 0.5rem; line-height: 1.02; }
  .core-pair { width: 156px; height: 86px; }
  .core-node { width: 74px; height: 74px; }
  .core-node span { font-size: 0.58rem; }
  .core-bridge { width: 34px; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="interface">
  <div class="header">
    <div class="title-with-phi">
      <span class="phi-symbol">Φ</span>
      <h1>Biblioteca</h1>
    </div>
  </div>

  <img class="header-logo" src="logo.png" alt="Logo" />

  <section class="star-map" id="map">
    <svg id="linksSvg">
      <defs>
        <linearGradient id="gradFlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
          <stop offset="50%" stop-color="#fff" stop-opacity="1"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="core-pair" id="corePair">
      <div class="core-bridge" aria-hidden="true"></div>
      <a class="core-node left" href="INDICE MATERIE/Storia.html"><span>Storia</span></a>
      <a class="core-node right" href="INDICE MATERIE/Natura.html"><span>Natura</span></a>
    </div>

    <a class="node" style="--d: 0s;" data-id="LOGISTICA" data-color="#ffffff" href="INDICE MATERIE/Logistica.html"><span>Logistica</span></a>
    <a class="node" style="--d: 1s;" data-id="MECCANICA" data-color="#60a5fa" href="INDICE MATERIE/Meccanica.html"><span>Meccanica</span></a>
    <a class="node" style="--d: 2s;" data-id="MATEMATICA" data-color="#fb923c" href="INDICE MATERIE/Matematica.html"><span>Matematica</span></a>
    <a class="node" style="--d: 0.5s;" data-id="ELETTROTECNICA" data-color="#a78bfa" href="INDICE MATERIE/Elettrotecnica.html"><span>Elettrotecnica</span></a>
    <a class="node" style="--d: 1.5s;" data-id="FISICA" data-color="#facc15" href="INDICE MATERIE/Fisica.html"><span>Fisica</span></a>
    <a class="node" style="--d: 2.5s;" data-id="STATISTICA" data-color="#f87171" href="INDICE MATERIE/Statistica.html"><span>Statistica</span></a>
    <a class="node" style="--d: 0.8s;" data-id="ARTE" data-color="#f472b6" href="INDICE MATERIE/Arte.html"><span>Arte</span></a>
    <a class="node" style="--d: 1.8s;" data-id="MUSICA" data-color="#2dd4bf" href="INDICE MATERIE/Musica.html"><span>Musica</span></a>
    <a class="node" style="--d: 2.2s;" data-id="SPORT" data-color="#4ade80" href="INDICE MATERIE/Sport.html"><span>Sport</span></a>
    <a class="node" style="--d: 3s;" data-id="CHIMICA" data-color="#22d3ee" href="INDICE MATERIE/Chimica.html"><span>Chimica</span></a>
    <a class="node" style="--d: 1.1s;" data-id="INFORMATICA" data-color="#34d399" href="INDICE MATERIE/Informatica.html"><span>Informatica</span></a>
    <a class="node" style="--d: 1.7s;" data-id="AUTOMAZIONE_ROBOTICA" data-color="#c084fc" href="INDICE MATERIE/AutomazioneRobotica.html"><span>Automazione<br>&amp;<br>Robotica</span></a>
  </section>
</div>

<script>
/* 1. STARFIELD */
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  for(let i=0; i<250; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5,
      opacity: Math.random(),
      speed: Math.random() * 0.04 + 0.01
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
    s.opacity += s.speed;
    if(s.opacity > 1 || s.opacity < 0) s.speed *= -1;
  });
  requestAnimationFrame(drawStars);
}

/* 2. LAYOUT + CONNESSIONI */
const map = document.getElementById('map');
const svg = document.getElementById('linksSvg');
const nodes = [...document.querySelectorAll('.node')];
const corePair = document.getElementById('corePair');

function curvedPath(x1, y1, x2, y2, bend=0.18) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const nx = -dy;
  const ny = dx;
  const len = Math.hypot(nx, ny) || 1;
  const ox = (nx / len) * Math.hypot(dx, dy) * bend;
  const oy = (ny / len) * Math.hypot(dx, dy) * bend;
  const c1x = x1 + dx * 0.25 + ox * 0.45;
  const c1y = y1 + dy * 0.25 + oy * 0.45;
  const c2x = x1 + dx * 0.75 + ox * 0.65;
  const c2y = y1 + dy * 0.75 + oy * 0.65;
  return `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`;
}

function updateLayout() {
  const w = map.offsetWidth;
  const h = map.offsetHeight;
  const cx = w / 2;
  const cy = h / 2;
  const small = window.innerWidth <= 900;
  const rx = w * (small ? 0.34 : 0.38);
  const ry = h * (small ? 0.28 : 0.31);

  corePair.style.left = `${cx}px`;
  corePair.style.top = `${cy}px`;

  const pos = {
    MATEMATICA:       {x: cx, y: cy - ry * 1.12},
    LOGISTICA:        {x: cx - rx, y: cy - ry * 0.62},
    ELETTROTECNICA:   {x: cx + rx, y: cy - ry * 0.62},
    AUTOMAZIONE_ROBOTICA: {x: cx + rx * 1.08, y: cy - ry * 0.02},
    MECCANICA:        {x: cx - rx * 1.08, y: cy + ry * 0.02},
    STATISTICA:       {x: cx + rx * 1.06, y: cy + ry * 0.48},
    INFORMATICA:         {x: cx - rx * 1.06, y: cy + ry * 0.48},
    CHIMICA:          {x: cx - rx * 0.84, y: cy + ry * 1.02},
    FISICA:           {x: cx + rx * 0.84, y: cy + ry * 1.02},
    ARTE:             {x: cx - rx * 0.26, y: cy + ry * 1.22},
    SPORT:            {x: cx, y: cy + ry * 1.38},
    MUSICA:           {x: cx + rx * 0.26, y: cy + ry * 1.22}
  };

  nodes.forEach(node => {
    const p = pos[node.dataset.id];
    if (!p) return;
    node.style.left = `${p.x}px`;
    node.style.top = `${p.y}px`;
    node.style.transform = 'translate(-50%, -50%)';
  });

  let paths = svg.querySelector('defs').outerHTML;
  const bends = {
    MATEMATICA: 0.10,
    LOGISTICA: -0.12,
    ELETTROTECNICA: 0.12,
    AUTOMAZIONE_ROBOTICA: 0.18,
    MECCANICA: -0.18,
    STATISTICA: 0.15,
    INFORMATICA: -0.15,
    CHIMICA: -0.16,
    FISICA: 0.16,
    ARTE: -0.08,
    SPORT: 0.00,
    MUSICA: 0.08
  };

  Object.entries(pos).forEach(([key, p]) => {
    const node = nodes.find(n => n.dataset.id === key);
    const color = node?.dataset.color || '#ffffff';
    const d = curvedPath(cx, cy, p.x, p.y, bends[key] ?? 0.12);
    paths += `<path d="${d}" class="connector" stroke="${color}" />`;
    paths += `<path d="${d}" class="energy-flow" stroke="${color}" />`;
  });

  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = paths;
}

window.addEventListener('resize', () => { initStars(); updateLayout(); });
initStars();
drawStars();
setTimeout(updateLayout, 50);
</script>
</body>
</html>
