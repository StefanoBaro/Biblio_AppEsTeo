<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Analisi Funzione - Clean Mode</title>
    <style>
        :root {
            --bg: #0a0a12;
            --grid: #1a1a2e;
            --lavender: #b39ddb;
            --aqua: #00f2ff;
            --teal: #00ffa2;
        }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 15, 30, 0.95); padding: 20px;
            border-radius: 8px; border: 1px solid var(--lavender);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px;
        }
        input { 
            width: 100%; background: #1a1a2e; border: 1px solid var(--aqua); 
            color: var(--aqua); padding: 10px; border-radius: 4px; 
            margin: 8px 0; box-sizing: border-box; font-family: monospace;
        }
        .data-panel {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(10, 10, 20, 0.8); padding: 15px;
            border-radius: 5px; border-right: 4px solid var(--teal);
            font-family: 'Courier New', monospace; font-size: 0.95rem;
        }
        label { font-size: 0.8rem; color: var(--lavender); text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui">
    <label>Funzione f(x)</label>
    <input type="text" id="func" value="sin(x) * 2" placeholder="es. x^2, exp(x), cos(x)">
    
    <label>Punto di analisi (x)</label>
    <input type="number" id="xNum" value="1" step="0.1">
    <input type="range" id="xSlide" min="-10" max="10" step="0.1" value="1">
    
    <div style="font-size: 0.7rem; color: #666; margin-top: 10px;">
        Supportati: sin, cos, tan, exp, log (ln), sqrt, ^, PI
    </div>
</div>

<div class="data-panel" id="outputEq"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fInput = document.getElementById('func');
const xNum = document.getElementById('xNum');
const xSlide = document.getElementById('xSlide');
const out = document.getElementById('outputEq');

let w, h, zoom = 60;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Sincronizzazione input rapida
xSlide.oninput = () => { xNum.value = xSlide.value; draw(); };
xNum.oninput = () => { xSlide.value = xNum.value; draw(); };
fInput.oninput = () => draw();

function f(x) {
    try {
        let expr = fInput.value.replace(/\^/g, '**')
            .replace(/sin|cos|tan|exp|log|sqrt|abs|PI|E/g, (m) => `Math.${m}`);
        return Function('x', `with(Math) { return ${expr} }`)(x);
    } catch(e) { return NaN; }
}

function draw() {
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, w, h);
    
    const cx = w/2;
    const cy = h/2;

    // --- GRIGLIA E COORDINATE ---
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#444';
    ctx.font = '10px Arial';

    for(let i = -20; i <= 20; i++) {
        // Linee Verticali
        ctx.beginPath();
        ctx.moveTo(cx + i*zoom, 0); ctx.lineTo(cx + i*zoom, h);
        ctx.stroke();
        if(i !== 0) ctx.fillText(i, cx + i*zoom + 2, cy - 2);

        // Linee Orizzontali
        ctx.beginPath();
        ctx.moveTo(0, cy + i*zoom); ctx.lineTo(w, cy + i*zoom);
        ctx.stroke();
        if(i !== 0) ctx.fillText(-i, cx + 2, cy + i*zoom - 2);
    }

    // Assi principali
    ctx.strokeStyle = 'rgba(179, 157, 219, 0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
    ctx.moveTo(0, cy); ctx.lineTo(w, cy);
    ctx.stroke();

    // --- DISEGNO CURVA (f(x)) ---
    ctx.beginPath();
    ctx.strokeStyle = '#00f2ff'; // Celeste
    ctx.lineWidth = 3;
    let started = false;
    for(let x = - (w/2)/zoom; x <= (w/2)/zoom; x += 0.02) {
        let y = f(x);
        if (isNaN(y) || Math.abs(y) > 50) { started = false; continue; }
        let sx = cx + x * zoom;
        let sy = cy - y * zoom;
        if(!started) { ctx.moveTo(sx, sy); started = true; }
        else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // --- LOGICA TANGENTE ---
    let px = parseFloat(xNum.value);
    let py = f(px);

    if (!isNaN(py)) {
        let h_diff = 0.0001;
        let m = (f(px + h_diff) - py) / h_diff;
        let q = py - m * px;

        // Retta Tangente (Verde Acqua)
        ctx.beginPath();
        ctx.strokeStyle = '#00ffa2';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 5]);
        let xS = px - 10, xE = px + 10;
        ctx.moveTo(cx + xS*zoom, cy - (m*xS + q)*zoom);
        ctx.lineTo(cx + xE*zoom, cy - (m*xE + q)*zoom);
        ctx.stroke();
        ctx.setLineDash([]);

        // Punto di contatto (Lavanda acceso)
        ctx.fillStyle = '#b39ddb';
        ctx.beginPath();
        ctx.arc(cx + px*zoom, cy - py*zoom, 6, 0, Math.PI*2);
        ctx.fill();

        // Equazione Output
        let qSign = q >= 0 ? "+" : "-";
        out.innerHTML = `
            <b style="color:var(--aqua)">f(x) = ${fInput.value}</b><br>
            Punto P(${px.toFixed(2)}, ${py.toFixed(2)})<br>
            <hr style="border:0; border-top:1px solid #333; margin:10px 0">
            <b style="color:var(--teal)">y = ${m.toFixed(2)}x ${qSign} ${Math.abs(q).toFixed(2)}</b>
        `;
    }
}

// Rendering iniziale
draw();
</script>
</body>
</html>
