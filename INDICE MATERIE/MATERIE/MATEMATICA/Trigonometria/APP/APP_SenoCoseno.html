<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Visualizzatore Trigonometrico Avanzato</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #1e293b; padding: 20px; border-radius: 12px; width: 90%; max-width: 1000px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stat-card { background: #334155; padding: 15px; border-radius: 8px; text-align: center; border-bottom: 4px solid #4dabf7; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        .main-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; }
        .controls { background: #1e293b; padding: 25px; border-radius: 12px; width: 280px; display: flex; flex-direction: column; gap: 20px; }
        canvas { background: #020617; border-radius: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        
        input[type=range] { width: 100%; accent-color: #3b82f6; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #22c55e; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn.paused { background: #ef4444; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px;">Laboratorio Seno e Coseno</h1>

    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-label">Angolo</div>
            <div id="val-deg" class="stat-value">0°</div>
        </div>
        <div class="stat-card" style="border-color: #ff4757;">
            <div class="stat-label">Seno (Altezza Y)</div>
            <div id="val-sin" class="stat-value">0.00</div>
        </div>
        <div class="stat-card" style="border-color: #3b82f6;">
            <div class="stat-label">Coseno (Base X)</div>
            <div id="val-cos" class="stat-value">1.00</div>
        </div>
        <div class="stat-card" style="border-color: #94a3b8;">
            <div class="stat-label">Ampiezza</div>
            <div id="val-amp" class="stat-value">1.0</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="controls">
            <button id="btnPlay" class="btn">PAUSA</button>
            
            <div>
                <label>Angolo Manuale</label>
                <input type="range" id="sldAngle" min="0" max="360" value="0">
            </div>
            <div>
                <label>Ampiezza (Raggio)</label>
                <input type="range" id="sldAmp" min="0.2" max="2.5" step="0.1" value="1">
            </div>
            <div>
                <label>Frequenza (Velocità)</label>
                <input type="range" id="sldFreq" min="0.1" max="5" step="0.1" value="1">
            </div>
        </div>

        <canvas id="canvas" width="800" height="500"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let state = {
        angle: 0,
        amp: 1,
        freq: 1,
        playing: true,
        history: []
    };

    // Binding controlli
    document.getElementById('btnPlay').onclick = (e) => {
        state.playing = !state.playing;
        e.target.textContent = state.playing ? "PAUSA" : "PLAY";
        e.target.className = state.playing ? "btn" : "btn paused";
    };

    function update() {
        state.amp = parseFloat(document.getElementById('sldAmp').value);
        state.freq = parseFloat(document.getElementById('sldFreq').value);
        
        if (state.playing) {
            state.angle += 0.02 * state.freq;
            if (state.angle > Math.PI * 2) state.angle -= Math.PI * 2;
            document.getElementById('sldAngle').value = (state.angle * 180 / Math.PI).toFixed(0);
        } else {
            state.angle = document.getElementById('sldAngle').value * Math.PI / 180;
        }

        // Aggiorna Pannello Testuale
        document.getElementById('val-deg').textContent = (state.angle * 180 / Math.PI).toFixed(0) + "°";
        document.getElementById('val-sin').textContent = Math.sin(state.angle).toFixed(2);
        document.getElementById('val-cos').textContent = Math.cos(state.angle).toFixed(2);
        document.getElementById('val-amp').textContent = state.amp.toFixed(1);

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const radius = state.amp * 60;
        const cx = 150, cy = 250;

        // --- DISEGNO CERCHIO ---
        ctx.strokeStyle = "#334155";
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();
        
        let targetX = cx + Math.cos(state.angle) * radius;
        let targetY = cy - Math.sin(state.angle) * radius;

        // Linee componenti
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "#475569";
        ctx.beginPath(); ctx.moveTo(targetX, cy); ctx.lineTo(targetX, targetY); ctx.stroke(); // Verticale
        ctx.setLineDash([]);

        // Coseno (Blu)
        ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(targetX, cy); ctx.stroke();
        
        // Seno (Rosso)
        ctx.strokeStyle = "#ff4757";
        ctx.beginPath(); ctx.moveTo(targetX, cy); ctx.lineTo(targetX, targetY); ctx.stroke();

        // Raggio
        ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(targetX, targetY); ctx.stroke();

        // --- GRAFICI ---
        const gX = 350, gW = 400;
        const sY = 130, cY = 370;

        state.history.unshift({s: Math.sin(state.angle), c: Math.cos(state.angle)});
        if(state.history.length > gW) state.history.pop();

        // Disegno Onde
        ctx.lineWidth = 2;
        
        // Onda Seno
        ctx.strokeStyle = "#ff4757";
        ctx.beginPath();
        state.history.forEach((p, i) => ctx.lineTo(gX + i, sY - p.s * radius));
        ctx.stroke();

        // Onda Coseno
        ctx.strokeStyle = "#3b82f6";
        ctx.beginPath();
        state.history.forEach((p, i) => ctx.lineTo(gX + i, cY - p.c * radius));
        ctx.stroke();

        // Titoli sui grafici
        ctx.fillStyle = "#94a3b8";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText("ONDA SENO", gX, sY - 80);
        ctx.fillText("ONDA COSENO", gX, cY - 80);
    }

    update();
</script>
</body>
</html>
