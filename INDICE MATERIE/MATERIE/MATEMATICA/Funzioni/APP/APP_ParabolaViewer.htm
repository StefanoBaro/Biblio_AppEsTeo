<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Analizzatore di Parabola Mediterraneo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Helvetica Neue', sans-serif; /* Un font pulito ma classico */
            margin: 20px; 
            /* Fondo luminoso come il sole di mezzogiorno */
            background-color: #fffaf0; /* Un bianco caldo, quasi crema */
            color: #333; /* Testo standard */
        }
        
        .container { 
            max-width: 850px; 
            margin: auto; 
            background: #ffffff; /* Sfondo bianco puro per i contenuti */
            padding: 25px; 
            border-radius: 12px; 
            /* Una leggera ombra calda */
            box-shadow: 0 4px 15px rgba(210, 105, 30, 0.15); /* Tonalità terracotta nell'ombra */
            border-top: 6px solid #ff4500; /* Un tocco di rosso 'Pompei' / arancione intenso */
        }
        
        h2 {
            color: #0056b3; /* Un blu mare profondo per il titolo */
            text-align: center;
            border-bottom: 2px solid #ff8c00; /* Linea arancione sole */
            padding-bottom: 10px;
        }

        .inputs { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 25px; 
            justify-content: center;
            align-items: center;
            background-color: #e0f7fa; /* Un blu cielo molto chiaro */
            padding: 15px;
            border-radius: 8px;
        }
        
        label {
            font-weight: bold;
            color: #0077be; /* Blu 'Provenza' */
        }

        input { 
            width: 65px; 
            padding: 8px; 
            border: 2px solid #ff8c00; /* Bordi arancioni */
            border-radius: 5px;
            font-size: 1.1em;
            text-align: center;
        }
        
        button {
            padding: 10px 20px;
            background-color: #ff4500; /* Rosso-arancione vivace */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #cd3700; /* Tonalità più scura al passaggio */
        }

        #results { 
            margin-top: 25px; 
            padding: 20px; 
            border-left: 5px solid #ff8c00; /* Bordo arancione 'sole' */
            background: #fff8e1; /* Un giallo paglierino chiaro */
            border-radius: 8px;
            line-height: 1.6;
            font-size: 1.05em;
        }
        
        #results b {
            color: #0056b3; /* Blu per i titoli dei risultati */
        }

        canvas { 
            max-width: 100%; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Analisi Geometrica della Parabola</h2>
    
    <div class="inputs">
        <label>a: <input type="number" id="a" value="1" step="0.1"></label>
        <label>b: <input type="number" id="b" value="-2" step="0.1"></label>
        <label>c: <input type="number" id="c" value="-1" step="0.1"></label>
        <button onclick="calcola()">Analizza</button>
    </div>

    <div id="results">Inserisci i parametri della parabola $y = ax^2 + bx + c$</div>
    <canvas id="myChart"></canvas>
</div>

<script>
// (Il codice JavaScript rimane identico al precedente)
let myChart;

function calcola() {
    const a = parseFloat(document.getElementById('a').value);
    const b = parseFloat(document.getElementById('b').value);
    const c = parseFloat(document.getElementById('c').value);

    if (a === 0) {
        alert("Il parametro 'a' non può essere zero in una parabola!");
        return;
    }

    const delta = (b * b) - (4 * a * c);
    const vx = -b / (2 * a);
    const vy = -delta / (4 * a);
    
    // Centro di curvatura al vertice
    const cx = vx;
    const cy = vy + (1 / (2 * a));

    // Risultati testuali
    let resHTML = `<b>Vertice:</b> V(${vx.toFixed(2)}, ${vy.toFixed(2)})<br>`;
    resHTML += `<b>Intersezione Y:</b> (0, ${c.toFixed(2)})<br>`;
    
    if (delta > 0) {
        const x1 = (-b + Math.sqrt(delta)) / (2 * a);
        const x2 = (-b - Math.sqrt(delta)) / (2 * a);
        resHTML += `<b>Intersezioni X:</b> X1(${x1.toFixed(2)}, 0), X2(${x2.toFixed(2)}, 0)<br>`;
    } else if (delta === 0) {
        resHTML += `<b>Intersezione X (Tangente):</b> (${vx.toFixed(2)}, 0)<br>`;
    } else {
        resHTML += `<b>Intersezioni X:</b> Nessuna (Delta < 0)<br>`;
    }
    
    resHTML += `<b>Centro di Curvatura al Vertice:</b> C(${cx.toFixed(2)}, ${cy.toFixed(2)})`;
    document.getElementById('results').innerHTML = resHTML;

    disegnaGrafico(a, b, c, vx, vy, cx, cy);
}

function disegnaGrafico(a, b, c, vx, vy, cx, cy) {
    const points = [];
    for (let x = vx - 5; x <= vx + 5; x += 0.2) {
        points.push({x: x, y: a*x*x + b*x + c});
    }

    if (myChart) myChart.destroy();

    const ctx = document.getElementById('myChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Parabola',
                data: points,
                showLine: true,
                borderColor: '#0077be', // Blu 'Provenza'
                borderWidth: 3,
                pointRadius: 0
            }, {
                label: 'Vertice',
                data: [{x: vx, y: vy}],
                backgroundColor: '#ff4500', // Rosso-arancione
                pointRadius: 8
            }, {
                label: 'Centro Curvatura',
                data: [{x: cx, y: cy}],
                backgroundColor: '#ffd700', // Giallo ocra / oro
                pointRadius: 8,
                pointStyle: 'rectRot' // Distinguiamo il punto
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { 
                    type: 'linear', 
                    position: 'bottom',
                    grid: { color: '#e0e0e0' } // Griglia chiara
                },
                y: { 
                    type: 'linear',
                    grid: { color: '#e0e0e0' } // Griglia chiara
                }
            },
            plugins: {
                legend: {
                    labels: {
                        color: '#333',
                        font: { size: 13 }
                    }
                }
            }
        }
    });
}

// Esegui al caricamento
calcola();
</script>

</body>
</html>
