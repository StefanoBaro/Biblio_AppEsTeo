<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Italy Logistic Optimizer - Standalone</title>
    <style>
        body { margin: 0; background: #05080a; color: #64ffda; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 380px; background: #0d1117; border-right: 2px solid #64ffda; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        #canvas-container { flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { background: #020408; border: 1px solid #1f6feb; }
        .node-card { background: rgba(31, 111, 235, 0.1); border: 1px solid #1f6feb; padding: 10px; border-radius: 4px; margin-bottom: 12px; position: relative; }
        input { background: #000; border: 1px solid #1f6feb; color: #64ffda; padding: 4px; font-size: 11px; width: 65px; border-radius: 2px; }
        .city-name { width: 60% !important; font-weight: bold; color: #fff; margin-bottom: 10px !important; }
        .row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; align-items: center; }
        .btn-del { background: #ff4444; color: white; border: none; cursor: pointer; padding: 4px 8px; font-size: 10px; border-radius: 3px; font-weight: bold; }
        .btn-add { width: 100%; padding: 12px; background: #64ffda; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .results { background: #161b22; padding: 15px; border: 1px solid #f1c40f; margin-bottom: 15px; text-align: center; }
        label { color: #8892b0; font-size: 9px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="results">
        <b style="color:#fff">BARICENTRO CALCOLATO</b><br>
        <span style="font-size:14px; color:#f1c40f;">LAT: <span id="outLat">--</span> | LON: <span id="outLon">--</span></span>
    </div>
    <div id="nodesList"></div>
    <button class="btn-add" onclick="addNode()">+ AGGIUNGI NODO</button>
</div>

<div id="canvas-container">
    <canvas id="italyCanvas" width="550" height="700"></canvas>
</div>

<script>
    const canvas = document.getElementById('italyCanvas');
    const ctx = canvas.getContext('2d');
    
    // Immagine incorporata (Placeholder stilizzato dell'Italia)
    const mapImg = new Image();
    // Questa è una stringa Base64 di un'icona mappa per garantire che appaia sempre
    mapImg.src = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MCA3MCI+PHBhdGggZD0iTTM1IDVMNDAgMTBMMzUgMTVMMzAgMjVMMjUgMzBMMjAgNDBMMTUgNDVMMTAgNTVMNSA2MEw3IDY1TDE1IDYwTDIwIDU1TDI1IDUwTDMwIDQ1TDM1IDQwTDQwIDM1TDQ1IDMwTDQ3IDI1TDQ1IDVMMzUgNVoiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzE0NTE4NiIgc3Ryb2tlLXdpZHRoPSIwLjUiLz48L3N2Zz4=";

    const GEO = { latMin: 35.0, latMax: 48.0, lonMin: 6.0, lonMax: 19.0 };

    let nodes = [
        { name: "MILANO", lat: 45.46, lon: 9.19, q: 10000, c: 1.0 },
        { name: "ROMA", lat: 41.89, lon: 12.49, q: 15000, c: 1.0 },
        { name: "BARI", lat: 41.11, lon: 16.87, q: 7000, c: 1.3 }
    ];

    function latLonToPixel(lat, lon) {
        const x = (lon - GEO.lonMin) * (canvas.width / (GEO.lonMax - GEO.lonMin));
        const y = (GEO.latMax - lat) * (canvas.height / (GEO.latMax - GEO.latMin));
        return { x, y };
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Sfondo Tecnico (Griglia)
        ctx.strokeStyle = "#161b22";
        for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

        let sumLatQC = 0, sumLonQC = 0, totalQC = 0;
        nodes.forEach(n => {
            const weight = (parseFloat(n.q) || 0) * (parseFloat(n.c) || 0);
            sumLatQC += n.lat * weight;
            sumLonQC += n.lon * weight;
            totalQC += weight;
        });

        if(totalQC > 0) {
            const cogLat = sumLatQC / totalQC;
            const cogLon = sumLonQC / totalQC;
            const cogPix = latLonToPixel(cogLat, cogLon);

            document.getElementById('outLat').innerText = cogLat.toFixed(2);
            document.getElementById('outLon').innerText = cogLon.toFixed(2);

            // Linee di forza
            nodes.forEach(n => {
                const p = latLonToPixel(n.lat, n.lon);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y); ctx.lineTo(cogPix.x, cogPix.y);
                ctx.strokeStyle = "rgba(100, 255, 218, 0.2)";
                ctx.lineWidth = Math.min(6, (n.q * n.c) / 3000);
                ctx.stroke();

                // Nodo
                ctx.fillStyle = "#1f6feb";
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "10px monospace";
                ctx.fillText(n.name, p.x + 8, p.y + 3);
            });

            // HUB RISULTANTE
            ctx.shadowBlur = 20; ctx.shadowColor = "#64ffda";
            ctx.fillStyle = "#64ffda";
            ctx.beginPath(); ctx.arc(cogPix.x, cogPix.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;
            ctx.strokeRect(cogPix.x-12, cogPix.y-12, 24, 24);
        }
    }

    function renderInputs() {
        const list = document.getElementById('nodesList');
        list.innerHTML = "";
        nodes.forEach((n, i) => {
            const card = document.createElement('div');
            card.className = 'node-card';
            card.innerHTML = `
                <div class="row">
                    <input type="text" class="city-name" value="${n.name}" oninput="nodes[${i}].name=this.value; update()">
                    <button class="btn-del" onclick="deleteNode(${i})">ELIMINA</button>
                </div>
                <div class="row">
                    <label>Lat/Lon</label>
                    <div>
                        <input type="number" step="0.01" value="${n.lat}" oninput="nodes[${i}].lat=parseFloat(this.value); update()">
                        <input type="number" step="0.01" value="${n.lon}" oninput="nodes[${i}].lon=parseFloat(this.value); update()">
                    </div>
                </div>
                <div class="row">
                    <label>Flusso (Q)</label>
                    <input type="number" value="${n.q}" oninput="nodes[${i}].q=parseFloat(this.value); update()">
                </div>
                <div class="row">
                    <label>Costo (C)</label>
                    <input type="number" step="0.1" value="${n.c}" oninput="nodes[${i}].c=parseFloat(this.value); update()">
                </div>
            `;
            list.appendChild(card);
        });
    }

    function deleteNode(idx) {
        nodes.splice(idx, 1);
        renderInputs();
        update();
    }

    function addNode() {
        nodes.push({ name: "NUOVO NODO", lat: 42.0, lon: 12.5, q: 5000, c: 1.0 });
        renderInputs();
        update();
    }

    renderInputs();
    update();
</script>
</body>
</html>
