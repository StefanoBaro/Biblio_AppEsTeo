<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Logistics ROI & CO2 Expert</title>
    <style>
        body { margin: 0; background: #020408; display: flex; color: #64ffda; font-family: 'Courier New', monospace; overflow: hidden; }
        #sidebar { width: 450px; background: #0d1117; border-right: 1px solid #1f6feb; padding: 20px; height: 100vh; box-sizing: border-box; z-index: 10; overflow-y: auto; }
        #canvas-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        canvas { border: 1px solid #1f6feb; background: #05080a; cursor: crosshair; }
        
        .stats { background: rgba(31, 111, 235, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #1f6feb; }
        .report-section { border-left: 3px solid #64ffda; padding-left: 10px; margin-top: 10px; font-size: 13px; }
        .co2 { border-color: #ff4d4d; color: #ff4d4d; }
        .euro { border-color: #f1c40f; color: #f1c40f; }
        
        .tappa-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; border: 1px solid transparent; }
        .tappa-row:hover { border-color: #1f6feb; }
        
        input, select { background: #000; border: 1px solid #1f6feb; color: #64ffda; padding: 5px; font-size: 11px; border-radius: 3px; }
        .inp-name { width: 90px; }
        .inp-num { width: 55px; }
        
        button { width: 100%; padding: 12px; background: #64ffda; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #64ffda; }
        button.secondary { background: transparent; color: #64ffda; border: 1px solid #64ffda; margin-top: 10px; }
        .del-btn { background: #ff4d4d; color: white; width: 28px; height: 28px; cursor: pointer; border: none; font-weight: bold; border-radius: 3px; }
        
        .label-row { display: flex; font-size: 9px; color: #8892b0; margin-bottom: 5px; text-transform: uppercase; padding-left: 10px; }
        b { color: #fff; }
        h2 { text-shadow: 0 0 10px #1f6feb; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="stats">
        <h2 style="margin:0 0 10px 0; font-size:18px;">COMMAND CENTER</h2>
        
        <div style="margin-bottom:15px; border-bottom:1px solid #1f6feb; padding-bottom:10px;">
            <label style="font-size:10px; color:#8892b0;">CARICO (TONNELLATE):</label><br>
            <input type="number" id="caricoTons" value="5" min="0.1" step="1" style="width: 95%; font-size: 20px; font-weight:bold; margin-top:5px;" oninput="aggiorna()">
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>DISTANZA:</span><b id="outDist">0 km</b>
        </div>
        
        <div class="report-section co2">
            <div style="display:flex; justify-content:space-between;">
                <span>EMISSIONI CO2:</span><b id="outCO2">0 kg</b>
            </div>
        </div>

        <div class="report-section euro">
            <div style="display:flex; justify-content:space-between;">
                <span>COSTO STIMATO:</span><b id="outEuro">0 €</b>
            </div>
        </div>

        <button onclick="avvia()" style="margin-top:20px;">▶ SIMULA ROTTA</button>
        <button class="secondary" onclick="addTappa()">+ NUOVO HUB</button>
        <button class="secondary" style="border-color:#f1c40f; color:#f1c40f;" onclick="exportReport()">💾 ESPORTA REPORT</button>
    </div>

    <div class="label-row">
        <div style="width:95px;">Città</div><div style="width:60px;">Lat</div><div style="width:60px;">Lon</div><div>Mezzo</div>
    </div>
    <div id="listaTappe"></div>
</div>

<div id="canvas-container">
    <canvas id="mapCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const mapImg = new Image();
    mapImg.src = 'https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg';

    // Calibrazione Mappa
    const OFFSET_X = -35; 
    const OFFSET_Y = -12;

    let tappe = [
        {n: "LONDON", lat: 51.50, lon: -0.12, modo: "GOMMA"},
        {n: "GENOVA", lat: 44.40, lon: 8.94, modo: "NAVE"},
        {n: "SUEZ", lat: 29.97, lon: 32.52, modo: "NAVE"},
        {n: "MUMBAI", lat: 18.97, lon: 72.82, modo: "NAVE"}
    ];

    const VETTORI = { 
        "NAVE":  {v:35,  c:"#1f6feb", i:"🚢", co2: 15, fuel_km: 0.08}, 
        "TRENO": {v:110, c:"#f1c40f", i:"🚂", co2: 25, fuel_km: 0.12}, 
        "GOMMA": {v:80,  c:"#64ffda", i:"🚛", co2: 85, fuel_km: 0.48} 
    };

    function gpsToCanvas(lat, lon) {
        const x = ((lon + 180) * (canvas.width / 360)) + OFFSET_X;
        const y = ((90 - lat) * (canvas.height / 180)) + OFFSET_Y;
        return { x, y };
    }

    function draw() {
        if (!mapImg.complete) return;
        const w = window.innerWidth - 450;
        const h = window.innerHeight;
        canvas.width = w; canvas.height = w / 2;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#05080a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.filter = "invert(1) brightness(0.2) opacity(0.6)";
        ctx.drawImage(mapImg, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        tappe.forEach((t, i) => {
            const p1 = gpsToCanvas(t.lat, t.lon);
            if (i < tappe.length - 1) {
                const p2 = gpsToCanvas(tappe[i+1].lat, tappe[i+1].lon);
                ctx.strokeStyle = VETTORI[t.modo].c;
                ctx.setLineDash(t.modo === "NAVE" ? [6, 4] : []);
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
            // Glow effect per gli Hub
            ctx.shadowBlur = 10; ctx.shadowColor = "#64ffda";
            ctx.fillStyle = "#64ffda";
            ctx.beginPath(); ctx.arc(p1.x, p1.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.font = "bold 10px monospace";
            ctx.fillText(t.n.toUpperCase(), p1.x + 10, p1.y + 3);
        });
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function aggiorna() {
        let dist = 0, co2Tot = 0, euroTot = 0;
        const tons = parseFloat(document.getElementById('caricoTons').value) || 0;

        for(let i=0; i<tappe.length-1; i++) {
            let d = haversine(tappe[i].lat, tappe[i].lon, tappe[i+1].lat, tappe[i+1].lon);
            if(isNaN(d)) d = 0;
            dist += d;
            co2Tot += (d * VETTORI[tappe[i].modo].co2 * tons) / 1000;
            euroTot += (d * VETTORI[tappe[i].modo].fuel_km * tons);
        }
        document.getElementById('outDist').innerText = Math.round(dist).toLocaleString() + " km";
        document.getElementById('outCO2').innerText = Math.round(co2Tot).toLocaleString() + " kg";
        document.getElementById('outEuro').innerText = Math.round(euroTot).toLocaleString() + " €";
        draw();
    }

    function renderInputs() {
        const c = document.getElementById('listaTappe');
        c.innerHTML = "";
        tappe.forEach((t, i) => {
            const opts = Object.keys(VETTORI).map(v => `<option value="${v}" ${t.modo==v?'selected':''}>${v}</option>`).join('');
            c.innerHTML += `
                <div class="tappa-row">
                    <input type="text" class="inp-name" value="${t.n}" oninput="tappe[${i}].n=this.value">
                    <input type="number" class="inp-num" value="${t.lat}" oninput="tappe[${i}].lat=parseFloat(this.value)||0; aggiorna()">
                    <input type="number" class="inp-num" value="${t.lon}" oninput="tappe[${i}].lon=parseFloat(this.value)||0; aggiorna()">
                    <select onchange="tappe[${i}].modo=this.value; aggiorna()">${opts}</select>
                    <button class="del-btn" onclick="removeTappa(${i})">×</button>
                </div>`;
        });
    }

    function addTappa() {
        const last = tappe[tappe.length-1];
        tappe.push({n: "NEW HUB", lat: last.lat - 5, lon: last.lon + 5, modo: "GOMMA"});
        renderInputs();
        aggiorna();
    }

    function removeTappa(i) {
        if(tappe.length > 2) {
            tappe.splice(i, 1);
            renderInputs();
            aggiorna();
        }
    }

    function exportReport() {
        let txt = `REPORT LOGISTICA\n------------------\n`;
        txt += `CARICO: ${document.getElementById('caricoTons').value} Tons\n`;
        txt += `DISTANZA: ${document.getElementById('outDist').innerText}\n`;
        txt += `CO2: ${document.getElementById('outCO2').innerText}\n`;
        txt += `COSTO: ${document.getElementById('outEuro').innerText}\n\nPERCORSO:\n`;
        tappe.forEach(t => txt += `- ${t.n} [${t.modo}]\n`);
        alert(txt);
    }

    let animId, currentLeg = 0, progress = 0;
    function avvia() {
        if(animId) cancelAnimationFrame(animId);
        currentLeg = 0; progress = 0;
        function animate() {
            draw();
            let s = tappe[currentLeg], e = tappe[currentLeg+1];
            if(!e) return;
            let pS = gpsToCanvas(s.lat, s.lon), pE = gpsToCanvas(e.lat, e.lon);
            progress += 0.01;
            if(progress >= 1) { progress = 0; currentLeg++; }
            let curX = pS.x + (pE.x - pS.x) * progress;
            let curY = pS.y + (pE.y - pS.y) * progress;
            ctx.font = "24px Arial"; ctx.fillText(VETTORI[s.modo].i, curX-12, curY+12);
            animId = requestAnimationFrame(animate);
        }
        animate();
    }

    mapImg.onload = () => { renderInputs(); aggiorna(); };
    window.onresize = aggiorna;
</script>
</body>
</html>
