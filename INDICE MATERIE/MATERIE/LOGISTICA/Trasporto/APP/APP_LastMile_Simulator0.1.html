<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Logistica Pro - Analisi Tempi Dettagliata</title>
    <style>
        body { margin: 0; background: #05080a; display: flex; color: #64ffda; font-family: 'Courier New', monospace; font-size: 12px; }
        #sidebar { width: 520px; background: #0d1117; border-right: 1px solid #64ffda; padding: 15px; box-sizing: border-box; height: 100vh; overflow-y: auto; }
        canvas { flex-grow: 1; background: #080c12; }
        .tappa-row { display: flex; gap: 4px; margin-bottom: 5px; align-items: center; background: rgba(100, 255, 218, 0.03); padding: 5px; border-radius: 3px; }
        .tappa-row input { background: #0a192f; border: 1px solid #1f6feb; color: #64ffda; padding: 2px; text-align: center; }
        .inp-name { width: 110px !important; text-align: left !important; padding-left: 5px !important; }
        .inp-coord { width: 45px; }
        .inp-data { width: 55px; }
        #dashboard { margin-bottom: 15px; border: 2px solid #64ffda; padding: 15px; background: #0a192f; position: sticky; top: 0; z-index: 100; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: none; transition: 0.3s; }
        .btn-start { background: #64ffda; color: #05080a; }
        .btn-opti { background: #f1c40f; color: #05080a; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .time-label { color: #8892b0; font-size: 10px; }
        .time-val { color: #fff; font-weight: bold; float: right; }
        .total-row { border-top: 1px dashed #64ffda; margin-top: 8px; padding-top: 8px; font-size: 1.2em; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="dashboard">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div>KM/H: <input type="number" id="vMedia" value="40" oninput="aggiorna()"></div>
            <div>PACCHI MAX: <input type="number" id="capMax" value="100" oninput="aggiorna()"></div>
        </div>
        
        <div id="stats-container">
            <div class="time-label">DISTANZA TOTALE: <span class="time-val" id="outDist">0 km</span></div>
            <div class="time-label">TEMPO IN VIAGGIO: <span class="time-val" id="outTravelTime">00:00:00</span></div>
            <div class="time-label">TEMPO IN PAUSA: <span class="time-val" id="outWaitTime">00:00:00</span></div>
            <div class="time-label total-row">TEMPO TOTALE (ETA): <span class="time-val" id="outTotal" style="color:#f1c40f">00:00:00</span></div>
        </div>

        <div class="btn-group">
            <button class="btn-opti" onclick="ottimizzaPercorso()">Suggerisci Percorso</button>
            <button class="btn-start" onclick="avvia()">Avvia Consegne</button>
        </div>
    </div>

    <div style="display: flex; font-weight: bold; margin-bottom: 5px; color: #8892b0; font-size: 9px;">
        <div style="width:115px;">DESTINAZIONE</div>
        <div style="width:50px;">X</div><div style="width:50px;">Y</div>
        <div style="width:60px;">SOSTA(m)</div><div style="width:60px;">PACCHI</div>
    </div>
    <div id="listaTappe"></div>
</div>

<canvas id="mapCanvas"></canvas>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const PX_KM = 45; 

    let tappe = [
        {n: "DEPOSITO", x: 50, y: 50, sosta: 0, pacchi: 0},
        {n: "CLIENTE A", x: 220, y: 180, sosta: 10, pacchi: 15},
        {n: "ZONA IND.", x: 120, y: 350, sosta: 25, pacchi: 30},
        {n: "NEGOZIO X", x: 450, y: 120, sosta: 15, pacchi: 10},
        {n: "UFFICIO Y", x: 380, y: 450, sosta: 5, pacchi: 5},
        {n: "CLIENTE B", x: 550, y: 320, sosta: 8, pacchi: 12},
        {n: "HUB EST", x: 650, y: 150, sosta: 20, pacchi: 20},
        {n: "CLIENTE C", x: 250, y: 550, sosta: 10, pacchi: 8},
        {n: "CLIENTE D", x: 600, y: 600, sosta: 12, pacchi: 5},
        {n: "RIENTRO", x: 60, y: 60, sosta: 0, pacchi: 0}
    ];

    let currentLeg = 0, progress = 0, isWaiting = false, waitTimer = 0, animId, pacchiCorrenti = 0;

    function formatTime(seconds) {
        let h = Math.floor(seconds / 3600);
        let m = Math.floor((seconds % 3600) / 60);
        let s = Math.floor(seconds % 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function renderInputs() {
        const container = document.getElementById('listaTappe');
        container.innerHTML = "";
        tappe.forEach((t, i) => {
            container.innerHTML += `
                <div class="tappa-row">
                    <input type="text" class="inp-name" value="${t.n}" onchange="tappe[${i}].n=this.value">
                    <input type="number" class="inp-coord" value="${t.x}" onchange="tappe[${i}].x=parseInt(this.value); aggiorna()">
                    <input type="number" class="inp-coord" value="${t.y}" onchange="tappe[${i}].y=parseInt(this.value); aggiorna()">
                    <input type="number" class="inp-data" value="${t.sosta}" onchange="tappe[${i}].sosta=parseInt(this.value); aggiorna()">
                    <input type="number" class="inp-data" value="${t.pacchi}" onchange="tappe[${i}].pacchi=parseInt(this.value); aggiorna()">
                </div>`;
        });
    }

    function aggiorna() {
        const v = parseFloat(document.getElementById('vMedia').value) || 1;
        let distPx = 0, minSoste = 0;
        for(let i=0; i<tappe.length-1; i++) {
            distPx += Math.hypot(tappe[i+1].x - tappe[i].x, tappe[i+1].y - tappe[i].y);
            minSoste += tappe[i].sosta;
        }
        const distKm = distPx / PX_KM;
        const secTravel = (distKm / v) * 3600;
        const secWait = minSoste * 60;
        
        document.getElementById('outDist').innerText = distKm.toFixed(1) + " km";
        document.getElementById('outTravelTime').innerText = formatTime(secTravel);
        document.getElementById('outWaitTime').innerText = formatTime(secWait);
        document.getElementById('outTotal').innerText = formatTime(secTravel + secWait);
        
        return { v };
    }

    function ottimizzaPercorso() {
        let ottimizzato = [tappe[0]];
        let rimanenti = tappe.slice(1, tappe.length - 1);
        let fine = tappe[tappe.length - 1];
        while (rimanenti.length > 0) {
            let ultimo = ottimizzato[ottimizzato.length - 1];
            rimanenti.sort((a, b) => Math.hypot(a.x - ultimo.x, a.y - ultimo.y) - Math.hypot(b.x - ultimo.x, b.y - ultimo.y));
            ottimizzato.push(rimanenti.shift());
        }
        ottimizzato.push(fine);
        tappe = ottimizzato;
        renderInputs();
        aggiorna();
    }

    function avvia() {
        const stats = aggiorna();
        if(animId) cancelAnimationFrame(animId);
        currentLeg = 0; progress = 0; isWaiting = false;
        pacchiCorrenti = tappe.reduce((acc, t) => acc + t.pacchi, 0);
        loop();
    }

    function loop() {
        canvas.width = window.innerWidth - 520;
        canvas.height = window.innerHeight;
        const vPxFrame = ((parseFloat(document.getElementById('vMedia').value) / 3.6) * PX_KM) / 60;

        function draw() {
            ctx.fillStyle = "#080c12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#1f6feb"; ctx.setLineDash([2, 2]); ctx.beginPath();
            tappe.forEach((t, i) => i==0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y)); ctx.stroke();
            ctx.setLineDash([]);

            let start = tappe[currentLeg], end = tappe[currentLeg+1];
            let dLeg = Math.hypot(end.x - start.x, end.y - start.y);

            if (!isWaiting) {
                progress += vPxFrame / dLeg;
                if (progress >= 1) {
                    progress = 0; currentLeg++;
                    if (currentLeg < tappe.length - 1) { 
                        isWaiting = true; waitTimer = 0; 
                        pacchiCorrenti -= tappe[currentLeg].pacchi; 
                    } else { return; }
                }
            } else {
                waitTimer++;
                if (waitTimer >= tappe[currentLeg].sosta * 60) isWaiting = false;
                ctx.strokeStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(start.x, start.y, (waitTimer % 20) + 5, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.fillText("STOP: " + tappe[currentLeg].n, start.x + 15, start.y);
            }

            const px = start.x + (end.x - start.x) * progress;
            const py = start.y + (end.y - start.y) * progress;
            ctx.fillStyle = "#fff"; ctx.fillRect(px-7, py-7, 14, 14);
            ctx.fillStyle = "#64ffda"; ctx.fillText("📦 " + pacchiCorrenti, px - 15, py - 15);
            animId = requestAnimationFrame(draw);
        }
        draw();
    }

    renderInputs();
    aggiorna();
</script>
</body>
</html>
