<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Logistica ABC - Ottimizzatore Slotting</title>
    <style>
        :root {
            --bg: #050508;
            --panel: #12121e;
            --cyan: #00fff2;
            --purple: #bb86fc;
            --green: #03dac6;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 360px;
            background: var(--panel);
            padding: 25px;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .card {
            background: #1a1a2d;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        h2 { color: var(--purple); margin-top: 0; font-size: 1.4rem; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #888; }

        input[type="number"], input[type="file"] {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--cyan);
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .btn-download {
            background: var(--purple);
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .canvas-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background-image: radial-gradient(#1a1a2d 1px, transparent 1px);
            background-size: 20px 20px;
        }

        canvas {
            background: #000;
            border: 3px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item { text-align: center; padding: 5px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Warehouse Optimizer</h2>
        
        <div class="card">
            <label>CARICA DATASET (CSV)</label>
            <input type="file" id="csvFile" accept=".csv">
            <p style="font-size: 0.7rem; color: #666; margin-top: 5px;">Formato: ID, Frequenza, Giacenza</p>
        </div>

        <div class="card">
            <label>DIMENSIONI LAYOUT (Slot)</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="dimW" value="18" title="Larghezza">
                <input type="number" id="dimH" value="12" title="Profondità">
            </div>
        </div>

        <div id="infoArea" class="card" style="display:none">
            <label>DISTRIBUZIONE ATTUALE</label>
            <div class="stats">
                <div class="stat-item" style="background:var(--cyan)">A: <span id="countA">0</span></div>
                <div class="stat-item" style="background:var(--purple)">B: <span id="countB">0</span></div>
                <div class="stat-item" style="background:var(--green)">C: <span id="countC">0</span></div>
            </div>
            <button class="btn-download" onclick="exportCSV()">ESPORTA PIANO (.csv)</button>
        </div>
    </div>

    <div class="canvas-area">
        <div style="color: var(--cyan); margin-bottom: 10px; letter-spacing: 2px; font-size: 0.8rem;">[ GATE 01 - INGRESSO MERCI ]</div>
        <canvas id="whCanvas"></canvas>
    </div>

<script>
    const fileInput = document.getElementById('csvFile');
    const dimWInput = document.getElementById('dimW');
    const dimHInput = document.getElementById('dimH');
    const canvas = document.getElementById('whCanvas');
    const ctx = canvas.getContext('2d');

    let inventory = [];

    fileInput.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            processData(event.target.result);
            document.getElementById('infoArea').style.display = 'block';
            render();
        };
        reader.readAsText(e.target.files[0]);
    });

    [dimWInput, dimHInput].forEach(i => i.addEventListener('input', render));

    function processData(csvText) {
        const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
        // Rileva separatore (, o ;)
        const sep = lines[0].includes(';') ? ';' : ',';
        
        let rawData = lines.map(line => line.split(sep));
        
        // Salta l'header se la prima riga non ha numeri nella seconda colonna
        if (isNaN(parseFloat(rawData[0][1]))) rawData.shift();

        // Trasforma in oggetti e ordina per Frequenza (decrescente)
        let items = rawData.map(cols => ({
            id: cols[0].trim(),
            freq: parseFloat(cols[1]) || 0,
            stock: parseInt(cols[2]) || 0
        })).sort((a, b) => b.freq - a.freq);

        // Algoritmo ABC Pareto (20/30/50)
        inventory = items.map((item, index, arr) => {
            const ratio = index / arr.length;
            item.class = ratio < 0.2 ? 'A' : (ratio < 0.5 ? 'B' : 'C');
            return item;
        });

        // Aggiorna contatori UI
        document.getElementById('countA').innerText = inventory.filter(i => i.class === 'A').length;
        document.getElementById('countB').innerText = inventory.filter(i => i.class === 'B').length;
        document.getElementById('countC').innerText = inventory.filter(i => i.class === 'C').length;
    }

    function render() {
        const cols = parseInt(dimWInput.value) || 1;
        const rows = parseInt(dimHInput.value) || 1;
        const cellSize = 35;

        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        // Genera slot mappati per Distanza di Manhattan
        let slots = [];
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                slots.push({ x, y, d: x + y });
            }
        }
        slots.sort((a, b) => a.d - b.d);

        // Disegna Heatmap di fondo
        slots.forEach(s => {
            const intensity = Math.min(s.d * 5, 40);
            ctx.fillStyle = `rgb(${10+intensity/2}, ${10+intensity/2}, ${25+intensity})`;
            ctx.fillRect(s.x * cellSize, s.y * cellSize, cellSize, cellSize);
            ctx.strokeStyle = "#222";
            ctx.strokeRect(s.x * cellSize, s.y * cellSize, cellSize, cellSize);
        });

        // Posiziona Articoli
        inventory.forEach((item, index) => {
            if (index < slots.length) {
                const s = slots[index];
                item.posX = s.x; item.posY = s.y; // Salva per export

                ctx.fillStyle = item.class === 'A' ? '#00fff2' : (item.class === 'B' ? '#bb86fc' : '#03dac6');
                ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                
                // Disegna box articolo
                ctx.fillRect(s.x * cellSize + 4, s.y * cellSize + 4, cellSize - 8, cellSize - 8);
                ctx.shadowBlur = 0;

                // Testo ID
                ctx.fillStyle = "#000";
                ctx.font = "bold 9px sans-serif";
                ctx.fillText(item.id.substring(0,5), s.x * cellSize + 7, s.y * cellSize + 18);
                ctx.font = "8px sans-serif";
                ctx.fillText("Q:" + item.stock, s.x * cellSize + 7, s.y * cellSize + 28);
            }
        });

        // Gate evidenziato
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.strokeRect(2, 2, cellSize - 4, cellSize - 4);
    }

    function exportCSV() {
        let content = "ID;Classe;Frequenza;Giacenza;X;Y;Distanza\n";
        inventory.forEach(i => {
            content += `${i.id};${i.class};${i.freq};${i.stock};${i.posX};${i.posY};${(i.posX+i.posY)}\n`;
        });
        const blob = new Blob([content], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'piano_slotting_ottimizzato.csv';
        a.click();
    }
</script>
</body>
</html>
