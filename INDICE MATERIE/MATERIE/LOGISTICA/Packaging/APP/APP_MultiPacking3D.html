<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Multi-Box 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06030e;--em:#00ff88;--vi:#bc13fe;--glass:rgba(16,8,30,.95)}
body{background:var(--bg);color:#fff;font-family:'Courier New',monospace;height:100vh;display:flex;overflow:hidden}

#panel{width:290px;min-width:290px;background:var(--glass);border-right:1px solid rgba(188,19,254,.2);
  display:flex;flex-direction:column;overflow-y:auto;z-index:10}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:#2a1040;border-radius:2px}

.ph{padding:12px 14px 10px;border-bottom:1px solid rgba(188,19,254,.18);text-align:center;flex-shrink:0}
.ph h1{font-size:12px;letter-spacing:3px;color:var(--em);font-weight:600}
.ph p{font-size:7px;color:#445;margin-top:2px}

.psec{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.sl{font-size:7px;color:var(--vi);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.fi{position:relative}
.fi label{position:absolute;top:-7px;left:6px;font-size:6px;background:#0e0620;padding:0 3px;color:var(--em);white-space:nowrap}
.fi input,.fi select{width:100%;padding:7px 6px;background:rgba(255,255,255,.05);border:1px solid rgba(188,19,254,.3);
  border-radius:5px;color:#fff;font-family:inherit;font-size:10px;outline:none}
.fi input:focus,.fi select:focus{border-color:var(--em)}

/* Box type cards */
#box-list{display:flex;flex-direction:column;gap:6px;padding:0 14px 8px}
.box-card{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:7px;
  padding:8px 10px;position:relative;transition:border-color .2s}
.box-card.active{border-color:rgba(188,19,254,.5)}
.bc-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bc-color{width:12px;height:12px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.bc-name{font-size:9px;color:#ccc;font-weight:600;flex:1}
.bc-qty{font-size:8px;color:var(--em);background:rgba(0,255,136,.1);padding:2px 6px;border-radius:3px}
.bc-del{background:none;border:none;color:#664;cursor:pointer;font-size:11px;padding:0;line-height:1}
.bc-del:hover{color:#ff5555}
.bc-fields{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
.bc-f{position:relative}
.bc-f label{position:absolute;top:-7px;left:5px;font-size:6px;background:#0a0318;padding:0 2px;color:#88aaff;white-space:nowrap}
.bc-f input{width:100%;padding:5px 4px;background:rgba(255,255,255,.04);border:1px solid rgba(100,136,255,.25);
  border-radius:4px;color:#dde;font-family:inherit;font-size:9px;outline:none}
.bc-f input:focus{border-color:#6488ff}

.btn{width:100%;padding:10px;border:none;border-radius:7px;
  background:linear-gradient(135deg,var(--vi),#6e0dd0);
  color:#fff;font-weight:600;cursor:pointer;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;transition:all .2s}
.btn:hover{box-shadow:0 0 16px rgba(188,19,254,.5)}
.btn.sec{background:rgba(255,255,255,.05);border:1px solid rgba(0,255,136,.3);color:var(--em)}
.btn.add{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);color:var(--em)}
.btn.sm{padding:6px 10px;font-size:8px}

/* stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sc{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,136,.1);border-radius:6px;padding:6px 8px;text-align:center}
.sc b{display:block;color:var(--em);font-size:13px}
.sc span{font-size:6px;color:#445;text-transform:uppercase;letter-spacing:1px}

/* type breakdown */
#type-breakdown{display:flex;flex-direction:column;gap:4px}
.tb-row{display:flex;align-items:center;gap:6px;font-size:8px}
.tb-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tb-name{flex:1;color:#778}
.tb-val{color:#aaa}

/* camera */
.cam-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cb{padding:5px 0;background:rgba(255,255,255,.04);border:1px solid rgba(188,19,254,.2);
  color:#778;border-radius:4px;cursor:pointer;font-size:7px;font-family:inherit;text-align:center;transition:all .15s}
.cb:hover{border-color:var(--em);color:var(--em)}

/* strategy */
.strat-btns{display:flex;gap:5px}
.sb{flex:1;padding:6px 4px;background:rgba(255,255,255,.04);border:1px solid rgba(188,19,254,.2);
  color:#778;border-radius:4px;cursor:pointer;font-size:7px;font-family:inherit;text-align:center;transition:all .15s;line-height:1.4}
.sb.on{border-color:var(--vi);color:var(--vi);background:rgba(188,19,254,.08)}

/* viewport */
#vp{flex:1;position:relative;overflow:hidden}
#cv{width:100%;height:100%;display:block;cursor:grab}
#cv:active{cursor:grabbing}

/* overlays */
#hud{position:absolute;top:10px;right:12px;background:rgba(6,3,14,.85);
  border:1px solid rgba(188,19,254,.2);border-radius:5px;padding:7px 12px;
  font-size:8px;color:#556;pointer-events:none;line-height:2;max-width:220px}
#hud .hi{color:var(--em)}
#floor-nav{position:absolute;bottom:12px;right:14px;display:flex;gap:6px;align-items:center}
.fn-btn{padding:5px 12px;background:rgba(6,3,14,.8);border:1px solid rgba(188,19,254,.3);
  color:#778;border-radius:4px;cursor:pointer;font-size:9px;font-family:inherit;transition:all .15s}
.fn-btn:hover{border-color:var(--em);color:var(--em)}
#floor-label{font-size:8px;color:#556;background:rgba(6,3,14,.8);padding:4px 10px;border-radius:4px;
  border:1px solid rgba(0,255,136,.1)}

/* tooltip */
#tooltip{position:absolute;background:rgba(6,3,14,.95);border:1px solid rgba(0,255,136,.3);
  border-radius:5px;padding:6px 10px;font-size:8px;color:#aaa;pointer-events:none;display:none;line-height:1.8}
</style>
</head>
<body>

<div id="panel">
  <div class="ph"><h1>MULTI-BOX 3D</h1><p>Ottimizzazione contenitore con tipi multipli</p></div>

  <!-- CONTAINER -->
  <div class="psec">
    <div class="sl">Contenitore (mm)</div>
    <div class="g3" style="margin-bottom:8px">
      <div class="fi"><label>X (largh.)</label><input type="number" id="cx" value="1200"></div>
      <div class="fi"><label>Y (prof.)</label><input type="number" id="cy" value="800"></div>
      <div class="fi"><label>Z (alt.)</label><input type="number" id="cz" value="2200"></div>
    </div>
    <div class="sl">Debordo (%)</div>
    <div class="g2">
      <div class="fi"><label>X %</label><input type="number" id="overX" value="0" step="1"></div>
      <div class="fi"><label>Y %</label><input type="number" id="overY" value="0" step="1"></div>
    </div>
  </div>

  <!-- STRATEGY -->
  <div class="psec">
    <div class="sl">Strategia di carico</div>
    <div class="strat-btns">
      <button class="sb on" data-s="heavy_first">Pesanti<br>in basso</button>
      <button class="sb" data-s="large_first">Grandi<br>prima</button>
      <button class="sb" data-s="fill_first">Riempi<br>per tipo</button>
      <button class="sb" data-s="interleave">Alterna<br>tipi</button>
    </div>
  </div>

  <!-- BOX TYPES -->
  <div class="psec" style="padding-bottom:4px">
    <div class="sl">Tipi di Scatola</div>
  </div>
  <div id="box-list"></div>
  <div style="padding:0 14px 10px">
    <button class="btn add" onclick="addBoxType()">+ AGGIUNGI TIPO SCATOLA</button>
  </div>

  <!-- CALC -->
  <div class="psec">
    <button class="btn" onclick="calculate()">⊕ OTTIMIZZA CARICO</button>
  </div>

  <!-- STATS -->
  <div class="psec">
    <div class="sl">Risultati</div>
    <div class="stats">
      <div class="sc"><b id="r-tot">0</b><span>Pacchi Totali</span></div>
      <div class="sc"><b id="r-eff">0%</b><span>Efficienza Vol.</span></div>
      <div class="sc"><b id="r-kg">0</b><span>Peso (kg)</span></div>
      <div class="sc"><b id="r-piani">0</b><span>Piani usati</span></div>
    </div>
    <div style="margin-top:8px">
      <div class="sl" style="margin-bottom:5px">Per tipo</div>
      <div id="type-breakdown"></div>
    </div>
  </div>

  <!-- CAMERA -->
  <div class="psec">
    <div class="sl" style="margin-bottom:6px">Camera</div>
    <div class="cam-btns">
      <button class="cb" onclick="setView('iso')">Iso</button>
      <button class="cb" onclick="setView('top')">Top</button>
      <button class="cb" onclick="setView('front')">Front</button>
      <button class="cb" onclick="setView('side')">Side</button>
      <button class="cb" onclick="toggleExplode()">Explode</button>
      <button class="cb" onclick="toggleWire()">Wire</button>
    </div>
  </div>
</div>

<!-- VIEWPORT -->
<div id="vp">
  <canvas id="cv"></canvas>
  <div id="hud">Configura i tipi di scatola e premi Ottimizza</div>
  <div id="floor-nav">
    <button class="fn-btn" onclick="changeFloor(-1)">▼</button>
    <div id="floor-label">Tutti i piani</div>
    <button class="fn-btn" onclick="changeFloor(1)">▲</button>
  </div>
  <div id="tooltip"></div>
</div>

<script>
// ── THREE ─────────────────────────────────────────────────────
const cv=document.getElementById('cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setClearColor(0x06030e,1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.add(new THREE.AmbientLight(0xffffff,.65));
const dl=new THREE.DirectionalLight(0xcceeff,1.1);
dl.position.set(3000,5000,2000);dl.castShadow=true;scene.add(dl);
const dl2=new THREE.DirectionalLight(0xffaacc,.4);
dl2.position.set(-2000,1000,-3000);scene.add(dl2);

const camera=new THREE.PerspectiveCamera(45,1,1,200000);
let sph={th:.7,ph:.52,r:5000},pan={x:0,y:0};
function updCam(){
  camera.position.set(pan.x+sph.r*Math.sin(sph.ph)*Math.sin(sph.th),
    pan.y+sph.r*Math.cos(sph.ph),sph.r*Math.sin(sph.ph)*Math.cos(sph.th));
  camera.lookAt(pan.x,pan.y,0);
}
updCam();

// Orbit
let drag=false,rDrag=false,lx=0,ly=0;
cv.addEventListener('mousedown',e=>{drag=true;rDrag=e.button===2;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
  if(rDrag){pan.x-=dx*sph.r*.001;pan.y+=dy*sph.r*.001;}
  else{sph.th-=dx*.005;sph.ph=Math.max(.04,Math.min(Math.PI-.04,sph.ph-dy*.005));}
  updCam();
});
cv.addEventListener('wheel',e=>{sph.r=Math.max(300,Math.min(40000,sph.r+e.deltaY*sph.r*.001));updCam();},{passive:true});

// Raycaster for tooltip
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
cv.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  checkHover(e.clientX,e.clientY);
});

// ── SCENE GROUPS ─────────────────────────────────────────────
const boxGroup=new THREE.Group();scene.add(boxGroup);
const wireGroup=new THREE.Group();scene.add(wireGroup);
let allMeshes=[];
let exploded=false,wireOnly=false;
let currentFloor=-1; // -1 = all
let totalFloors=0;
let lastResult=null;

// ── BOX TYPES CONFIG ──────────────────────────────────────────
const PALETTE=[
  '#00ff88','#bc13fe','#ff6644','#44aaff','#ffcc00',
  '#ff44aa','#44ffcc','#ff8844','#aa44ff','#88ff44'
];
let boxTypes=[];
let nextId=1;

function addBoxType(preset=null){
  const id=nextId++;
  const col=PALETTE[(boxTypes.length)%PALETTE.length];
  const bt=preset||{id,name:`Tipo ${id}`,px:300,py:250,pz:200,qty:50,w:4,color:col,enabled:true};
  bt.id=id; bt.color=col;
  boxTypes.push(bt);
  renderBoxList();
}

function removeBoxType(id){
  boxTypes=boxTypes.filter(b=>b.id!==id);
  renderBoxList();
}

function renderBoxList(){
  const list=document.getElementById('box-list');
  list.innerHTML='';
  boxTypes.forEach(bt=>{
    const card=document.createElement('div');
    card.className='box-card';
    card.innerHTML=`
      <div class="bc-header">
        <div class="bc-color" style="background:${bt.color}"></div>
        <input class="bc-name" value="${bt.name}" style="background:none;border:none;color:#ccc;font-size:9px;font-weight:600;font-family:inherit;outline:none;flex:1" onchange="updateBT(${bt.id},'name',this.value)">
        <span class="bc-qty">${bt.qty} pz</span>
        <button class="bc-del" onclick="removeBoxType(${bt.id})">✕</button>
      </div>
      <div class="bc-fields">
        <div class="bc-f"><label>X mm</label><input type="number" value="${bt.px}" onchange="updateBT(${bt.id},'px',+this.value)"></div>
        <div class="bc-f"><label>Y mm</label><input type="number" value="${bt.py}" onchange="updateBT(${bt.id},'py',+this.value)"></div>
        <div class="bc-f"><label>Z mm</label><input type="number" value="${bt.pz}" onchange="updateBT(${bt.id},'pz',+this.value)"></div>
        <div class="bc-f"><label>Qnt.</label><input type="number" value="${bt.qty}" onchange="updateBT(${bt.id},'qty',+this.value)"></div>
        <div class="bc-f"><label>kg/pz</label><input type="number" value="${bt.w}" step="0.1" onchange="updateBT(${bt.id},'w',+this.value)"></div>
        <div class="bc-f" style="grid-column:2/5"><label>Colore</label>
          <input type="color" value="${bt.color}" onchange="updateBT(${bt.id},'color',this.value)" style="height:28px;padding:2px 3px;cursor:pointer">
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function updateBT(id,key,val){
  const bt=boxTypes.find(b=>b.id===id);
  if(bt){bt[key]=val; if(key==='qty'||key==='color') renderBoxList();}
}

// ── STRATEGY ─────────────────────────────────────────────────
let strategy='heavy_first';
document.querySelectorAll('.sb').forEach(b=>{
  b.addEventListener('click',()=>{
    strategy=b.dataset.s;
    document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  });
});

// ── PACKING LOGIC ─────────────────────────────────────────────
function solve2D(W,D,w,d){
  let best={count:0,layout:[]};
  for(let i=0;i<=Math.floor(W/w);i++){
    const c1=i*w,c2=W-c1;
    const n=i*Math.floor(D/d)+Math.floor(c2/d)*Math.floor(D/w);
    if(n>best.count){
      best.count=n;
      best.layout=[
        {x:0,y:0,pw:w,pd:d,countX:i,countY:Math.floor(D/d),rot:false},
        {x:c1,y:0,pw:d,pd:w,countX:Math.floor(c2/d),countY:Math.floor(D/w),rot:true}
      ];
    }
  }
  for(let j=0;j<=Math.floor(D/d);j++){
    const r1=j*d,r2=D-r1;
    const n=Math.floor(W/w)*j+Math.floor(W/d)*Math.floor(r2/w);
    if(n>best.count){
      best.count=n;
      best.layout=[
        {x:0,y:0,pw:w,pd:d,countX:Math.floor(W/w),countY:j,rot:false},
        {x:0,y:r1,pw:d,pd:w,countX:Math.floor(W/d),countY:Math.floor(r2/w),rot:true}
      ];
    }
  }
  return best;
}

function bestOrient(bt,W,D){
  const tries=[
    {h:bt.pz,w:bt.px,d:bt.py},
    {h:bt.px,w:bt.pz,d:bt.py},
    {h:bt.py,w:bt.px,d:bt.pz},
  ];
  let best=null;
  tries.forEach(o=>{
    if(o.w<=W&&o.d<=D){
      const p=solve2D(W,D,o.w,o.d);
      if(!best||p.count>best.pack.count) best={o,pack:p};
    }
  });
  return best;
}

// ── MAIN CALCULATE ────────────────────────────────────────────
function calculate(){
  if(boxTypes.length===0){alert('Aggiungi almeno un tipo di scatola!');return;}
  const CX=+document.getElementById('cx').value;
  const CY=+document.getElementById('cy').value;
  const CZ=+document.getElementById('cz').value;
  const overX=+document.getElementById('overX').value/100;
  const overY=+document.getElementById('overY').value/100;
  const CX_U=CX*(1+overX), CY_U=CY*(1+overY);

  // Sort box types by strategy
  let sorted=[...boxTypes];
  if(strategy==='heavy_first') sorted.sort((a,b)=>b.w-a.w);
  else if(strategy==='large_first') sorted.sort((a,b)=>(b.px*b.py*b.pz)-(a.px*a.py*a.pz));
  else if(strategy==='interleave') sorted=interleaveArrays(sorted);

  // Assign boxes to floors
  // floors: stacks of layers, each layer is a single box type best-fit
  const floors=[];
  const remaining={};
  sorted.forEach(bt=>{remaining[bt.id]=bt.qty;});

  let zCurrent=0;
  let safetyBreak=0;

  while(zCurrent<CZ&&safetyBreak<200){
    safetyBreak++;
    let placed=false;
    // try each type in sorted order
    for(const bt of sorted){
      if(remaining[bt.id]<=0) continue;
      const res=bestOrient(bt,CX_U,CY_U);
      if(!res) continue;
      const{o,pack}=res;
      if(zCurrent+o.h>CZ+1) continue;
      const canPlace=Math.min(remaining[bt.id],pack.count);
      if(canPlace<=0) continue;

      // build floor boxes list
      const boxes=[];
      let placed_n=0;
      for(const block of pack.layout){
        for(let ix=0;ix<block.countX&&placed_n<canPlace;ix++){
          for(let iy=0;iy<block.countY&&placed_n<canPlace;iy++){
            boxes.push({
              x:block.x+ix*block.pw, y:block.y+iy*block.pd,
              w:block.pw, d:block.pd, h:o.h,
              rot:block.rot, btId:bt.id, btName:bt.name, btColor:bt.color, btW:bt.w,
              floor:floors.length
            });
            placed_n++;
          }
        }
      }

      remaining[bt.id]-=placed_n;
      floors.push({boxes,floorH:o.h,zBase:zCurrent,btId:bt.id,btName:bt.name,btColor:bt.color});
      zCurrent+=o.h;
      placed=true;
      break;
    }
    if(!placed) break;
  }

  // Stats
  const totalBoxes=floors.reduce((s,f)=>s+f.boxes.length,0);
  const totalKg=floors.reduce((s,f)=>s+f.boxes.reduce((ss,b)=>ss+b.btW,0),0);
  const volPacked=floors.reduce((s,f)=>s+f.boxes.reduce((ss,b)=>ss+b.w*b.d*b.h,0),0);
  const eff=((volPacked/(CX*CY*CZ))*100).toFixed(1);

  // Per-type breakdown
  const byType={};
  boxTypes.forEach(bt=>{byType[bt.id]={name:bt.name,color:bt.color,count:0,kg:0};});
  floors.forEach(f=>f.boxes.forEach(b=>{
    if(byType[b.btId]){byType[b.btId].count++;byType[b.btId].kg+=b.btW;}
  }));

  document.getElementById('r-tot').textContent=totalBoxes;
  document.getElementById('r-eff').textContent=eff+'%';
  document.getElementById('r-kg').textContent=totalKg.toFixed(0);
  document.getElementById('r-piani').textContent=floors.length;

  const bd=document.getElementById('type-breakdown');
  bd.innerHTML=Object.values(byType).filter(t=>t.count>0).map(t=>
    `<div class="tb-row"><div class="tb-dot" style="background:${t.color}"></div>
    <span class="tb-name">${t.name}</span>
    <span class="tb-val">${t.count} pz · ${t.kg.toFixed(0)} kg</span></div>`
  ).join('');

  totalFloors=floors.length;
  currentFloor=-1;
  document.getElementById('floor-label').textContent='Tutti i piani';

  lastResult={floors,CX,CY,CZ,CX_U,CY_U,totalBoxes,eff,totalKg};
  buildScene3D(lastResult);

  document.getElementById('hud').innerHTML=
    `Totale: <span class="hi">${totalBoxes}</span> scatole · <span class="hi">${eff}%</span> efficienza<br>`+
    `Strategia: <span class="hi">${strategy}</span> · Piani: <span class="hi">${floors.length}</span><br>`+
    `Peso totale: <span class="hi">${totalKg.toFixed(0)}</span> kg<br>`+
    `Contenitore: ${CX}×${CY}×${CZ} mm`+
    (overX||overY?`<br>Debordo: <span class="hi">X+${(overX*100).toFixed(0)}% Y+${(overY*100).toFixed(0)}%</span>`:'');
}

function interleaveArrays(arr){
  const res=[];
  const maxLen=arr.length;
  for(let i=0;i<maxLen;i++) res.push(arr[i%arr.length]);
  return arr; // simplified
}

// ── GRAVITY: drop boxes to lowest available Z ─────────────────
function applyGravity(floors){
  // Build a flat list of all placed boxes with absolute positions
  const allBoxes=[];
  floors.forEach((fl,fi)=>{
    fl.boxes.forEach(b=>{
      allBoxes.push({
        x:b.x, z:b.y,           // footprint origin (x,z in world)
        w:b.w, d:b.d, h:b.h,    // dimensions
        yBase:fl.zBase,          // current bottom Y
        btId:b.btId,btName:b.btName,btColor:b.btColor,btW:b.btW,rot:b.rot,
        floorIdx:fi
      });
    });
  });

  // Sort bottom-up so lower boxes settle first
  allBoxes.sort((a,b)=>a.yBase-b.yBase);

  // For each box find the highest top surface of any overlapping box below it
  const settled=[];
  allBoxes.forEach(box=>{
    const x0=box.x, x1=box.x+box.w;
    const z0=box.z, z1=box.z+box.d;
    let floor=0;
    settled.forEach(s=>{
      const sx0=s.x, sx1=s.x+s.w, sz0=s.z, sz1=s.z+s.d;
      const overlap=sx0<x1-1&&sx1>x0+1&&sz0<z1-1&&sz1>z0+1;
      if(overlap) floor=Math.max(floor,s.yBase+s.h);
    });
    box.yBase=floor;
    settled.push({...box});
  });

  return settled;
}

// ── BUILD 3D ─────────────────────────────────────────────────
function buildScene3D(result){
  boxGroup.clear();wireGroup.clear();allMeshes=[];

  const{floors,CX,CY,CZ,CX_U,CY_U}=result;
  const gap=3;

  // Apply gravity — settle each box to its real resting height
  const settled=applyGravity(floors);

  // Container wireframe
  const cGeo=new THREE.BoxGeometry(CX,CZ,CY);
  const cEdge=new THREE.EdgesGeometry(cGeo);
  const cLine=new THREE.LineSegments(cEdge,new THREE.LineBasicMaterial({color:0xffb400,opacity:.5,transparent:true}));
  cLine.position.set(CX/2,CZ/2,CY/2);wireGroup.add(cLine);

  if(CX_U>CX||CY_U>CY){
    const oGeo=new THREE.BoxGeometry(CX_U,CZ,CY_U);
    const oEdge=new THREE.EdgesGeometry(oGeo);
    const oLine=new THREE.LineSegments(oEdge,new THREE.LineBasicMaterial({color:0xbc13fe,opacity:.25,transparent:true}));
    oLine.position.set(CX_U/2,CZ/2,CY_U/2);wireGroup.add(oLine);
  }

  // Grid
  const gSize=Math.max(CX_U,CY_U)*1.4;
  const grid=new THREE.GridHelper(gSize,24,0x1a0a2e,0x110720);
  grid.position.set(CX_U/2,0,CY_U/2);wireGroup.add(grid);

  // Boxes — use settled positions (gravity applied)
  settled.forEach((b,bi)=>{
    const bw=b.w-gap, bd=b.d-gap, bh=b.h-gap;
    if(bw<=0||bd<=0||bh<=0) return;

    const geo=new THREE.BoxGeometry(bw,bh,bd);
    const col=new THREE.Color(b.btColor);
    const shade=0.72+b.floorIdx*0.045;
    col.multiplyScalar(Math.min(shade,1.2));

    const mat=new THREE.MeshPhongMaterial({
      color:col,transparent:true,opacity:.86,shininess:55,
      emissive:new THREE.Color(b.btColor).multiplyScalar(.06)
    });
    const mesh=new THREE.Mesh(geo,mat);
    const mx=b.x+bw/2+gap/2;
    const my=b.yBase+bh/2+gap/2;   // settled Y — no floating
    const mz=b.z+bd/2+gap/2;
    mesh.position.set(mx,my,mz);
    mesh.castShadow=true;mesh.receiveShadow=true;
    mesh.userData={btName:b.btName,btColor:b.btColor,w:b.w,d:b.d,h:b.h,
      kg:b.btW,floor:b.floorIdx,rot:b.rot,yBase:b.yBase};
    boxGroup.add(mesh);allMeshes.push(mesh);

    const eGeo=new THREE.EdgesGeometry(geo);
    const eLine=new THREE.LineSegments(eGeo,
      new THREE.LineBasicMaterial({color:new THREE.Color(b.btColor).multiplyScalar(1.5),opacity:.35,transparent:true}));
    eLine.position.copy(mesh.position);
    eLine.userData={floor:b.floorIdx};
    wireGroup.add(eLine);
  });

  // Center camera
  pan={x:CX_U/2,y:CZ/2};
  sph.r=Math.max(CX_U,CY_U,CZ)*2.6;
  updCam();
  updateFloorVisibility();
}

// ── FLOOR NAV ────────────────────────────────────────────────
function changeFloor(dir){
  if(!lastResult) return;
  if(dir===0){currentFloor=-1;}
  else{
    if(currentFloor===-1) currentFloor=dir>0?0:totalFloors-1;
    else currentFloor=Math.max(-1,Math.min(totalFloors-1,currentFloor+dir));
    if(currentFloor<0) currentFloor=-1;
  }
  const lbl=currentFloor===-1?'Tutti i piani':`Piano ${currentFloor+1}/${totalFloors}`;
  document.getElementById('floor-label').textContent=lbl;
  updateFloorVisibility();
}

function updateFloorVisibility(){
  allMeshes.forEach(m=>{
    const show=currentFloor===-1||m.userData.floor===currentFloor;
    m.visible=show;
    m.material.opacity=show?(currentFloor===-1?.85:.95):.85;
  });
  wireGroup.children.forEach(c=>{
    if(c.userData&&c.userData.floor!==undefined){
      c.visible=currentFloor===-1||c.userData.floor===currentFloor;
    }
  });
}

// ── HOVER TOOLTIP ─────────────────────────────────────────────
function checkHover(mx,my){
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(allMeshes);
  const tt=document.getElementById('tooltip');
  if(hits.length>0){
    const d=hits[0].object.userData;
    tt.style.display='block';
    tt.style.left=(mx+12)+'px';tt.style.top=(my-10)+'px';
    tt.innerHTML=`<span style="color:${d.btColor}">■</span> <b>${d.btName}</b><br>`+
      `${d.w}×${d.d}×${d.h} mm<br>`+
      `${d.kg} kg · Piano ${d.floor+1}`+
      (d.rot?'<br><span style="color:#6488ff">ruotato 90°</span>':'');
  } else {
    tt.style.display='none';
  }
}

// ── CAMERA PRESETS ────────────────────────────────────────────
function setView(v){
  if(!lastResult) return;
  if(v==='iso'){sph.th=.7;sph.ph=.52;}
  else if(v==='top'){sph.th=.001;sph.ph=.05;}
  else if(v==='front'){sph.th=.001;sph.ph=Math.PI/2-.02;}
  else if(v==='side'){sph.th=Math.PI/2;sph.ph=Math.PI/2-.02;}
  updCam();
}

function toggleExplode(){
  if(!lastResult) return;
  exploded=!exploded;
  const{CX_U,CY_U,CZ}=lastResult;
  const cx=CX_U/2,cy=CZ/2,cz=CY_U/2;
  allMeshes.forEach(m=>{
    const dx=m.position.x-cx,dy=m.position.y-cy,dz=m.position.z-cz;
    const f=exploded?1.4:1/1.4;
    m.position.set(cx+dx*f,cy+dy*f,cz+dz*f);
  });
}

function toggleWire(){
  wireOnly=!wireOnly;
  allMeshes.forEach(m=>{m.material.wireframe=wireOnly;m.material.opacity=wireOnly?.5:.85;});
}

// ── RESIZE & LOOP ─────────────────────────────────────────────
function resize(){
  const vp=document.getElementById('vp');
  const W=vp.clientWidth,H=vp.clientHeight;
  renderer.setSize(W,H,false);
  camera.aspect=W/H;camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);resize();

function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);}
loop();
