<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elettrotecnica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0a0c12; --bg2:#121723; --panel:rgba(17,22,31,.92); --panel2:rgba(23,29,42,.86);
  --line:rgba(125,95,220,.22); --line2:rgba(89,173,136,.18); --vio:#7d5fdc; --vio2:#b8a4ff;
  --green:#59ad88; --text:#eef2ff; --soft:#c7cee6; --muted:#96a0bd; --shadow:rgba(0,0,0,.35);
  --radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; font-family:'Inter',sans-serif; color:var(--text);
  background:
    radial-gradient(circle at 12% 16%, rgba(125,95,220,.10), transparent 18%),
    radial-gradient(circle at 82% 76%, rgba(89,173,136,.10), transparent 22%),
    linear-gradient(160deg,#07080c 0%,#0d1119 42%,#141a28 100%);
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.22;
  background-image:
    linear-gradient(rgba(125,95,220,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(89,173,136,.035) 1px, transparent 1px);
  background-size:48px 48px;
}
.page{position:relative; z-index:1; max-width:1160px; margin:0 auto; padding:24px 18px 52px;}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin:0 2px 18px; flex-wrap:wrap;}
.title-wrap{display:flex; align-items:center; gap:10px; color:var(--soft);}
.title-wrap .phi{font-family:'Cinzel',serif; font-size:1.15rem; line-height:1; color:var(--vio2);}
.title-wrap h1{margin:0; font-family:'Cinzel',serif; font-size:1.05rem; color:var(--vio2); letter-spacing:.06em; text-transform:uppercase; font-weight:700;}
.back-link{
  display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-weight:700;
  padding:10px 14px; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.back-link:hover{transform:translateY(-1px); border-color:rgba(125,95,220,.30); background:rgba(255,255,255,.06);}
.toolbar,.box{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)), var(--panel);
  border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 14px 32px var(--shadow);
}
.toolbar{padding:14px; display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px; margin-bottom:18px;}
.field{display:flex; flex-direction:column; gap:6px;}
label{font-size:.86rem; color:var(--muted); font-weight:700; letter-spacing:.02em;}
input,select{
  width:100%; border:none; outline:none; padding:12px 14px; border-radius:12px; font:inherit; color:var(--text);
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); -webkit-appearance:none; appearance:none;
}
select{cursor:pointer; color-scheme:dark;}
select option{background:#121723; color:var(--text);}
input::placeholder{color:var(--muted);}
input:focus,select:focus{border-color:var(--vio); box-shadow:0 0 0 3px rgba(125,95,220,.15);}
.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
.box{padding:14px;}
.section-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;}
.section-head h3{margin:0; font-size:1rem; color:var(--text);}
.section-head span{font-size:.8rem; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.08); font-weight:800;}
.box.app .section-head span{background:rgba(89,173,136,.12); color:#8ee3bf; border-color:rgba(89,173,136,.18);}
.box.teo .section-head span,.box.es .section-head span{background:rgba(125,95,220,.12); color:var(--vio2); border-color:rgba(125,95,220,.20);}
.item-grid{display:grid; gap:10px;}
.entry-card{
  display:block; text-decoration:none; color:inherit; border-radius:12px; padding:12px; background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06); transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.entry-card:hover{transform:translateY(-2px); border-color:rgba(125,95,220,.32); background:rgba(255,255,255,.05);}
.entry-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px;}
.kind,.year{display:inline-flex; padding:5px 8px; border-radius:999px; font-size:.73rem; font-weight:800; letter-spacing:.02em;}
.kind{background:rgba(89,173,136,.12); color:#8ee3bf; border:1px solid rgba(89,173,136,.18);}
.year{background:rgba(125,95,220,.12); color:var(--vio2); border:1px solid rgba(125,95,220,.18);}
.entry-title{font-weight:800; line-height:1.3;}
.entry-desc{margin-top:6px; color:var(--soft); font-size:.92rem; line-height:1.45;}
.empty-slot{min-height:90px; display:flex; align-items:center; justify-content:center; text-align:center; color:var(--muted); border:1px dashed rgba(255,255,255,.1); border-radius:12px; background:rgba(255,255,255,.02);}
.hidden{display:none !important;}
@media (max-width: 980px){.toolbar,.grid{grid-template-columns:1fr;}}
@media (max-width: 640px){.page{padding:20px 14px 40px}.topbar{align-items:flex-start;}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="title-wrap">
      <span class="phi" aria-hidden="true">Φ</span>
      <h1>Elettrotecnica</h1>
    </div>
    <a class="back-link" href="../index.html">← Torna all’indice</a>
  </div>

  <section class="toolbar">
    <div class="field">
      <label for="search">Cerca contenuto</label>
      <input id="search" type="search" placeholder="Es. Kirchhoff, RC, PID..." />
    </div>
    <div class="field">
      <label for="yearFilter">Anno</label>
      <select id="yearFilter">
        <option value="">Tutti</option>
        <option value="Anno 2">Anno 2</option>
        <option value="Anno 3">Anno 3</option>
      </select>
    </div>
    <div class="field">
      <label for="typeFilter">Tipo</label>
      <select id="typeFilter">
        <option value="">Tutti</option>
        <option value="APP">APP</option>
        <option value="TEO">TEO</option>
        <option value="ES">ES</option>
      </select>
    </div>
  </section>

  <section class="grid">
    <div class="box app" data-box="APP">
      <div class="section-head"><h3>Applicazioni</h3><span>APP</span></div>
      <div class="item-grid">
        <a class="entry-card" data-kind="APP" data-year="Anno 2" data-text="kirchoff solver circuiti" href="Pagine/ELETTROTECNICA/APP/APP_KirchoffSolver.html">
          <div class="entry-top"><span class="kind">APP</span><span class="year">Anno 2</span></div>
          <div class="entry-title">Kirchoff Solver</div>
          <div class="entry-desc">Risolutore di circuiti con leggi di Kirchhoff.</div>
        </a>
      </div>
    </div>

    <div class="box teo" data-box="TEO">
      <div class="section-head"><h3>Teoria</h3><span>TEO</span></div>
      <div class="item-grid">
        <a class="entry-card" data-kind="TEO" data-year="Anno 2" data-text="circuito rc risposta temporale" href="Pagine/ELETTROTECNICA/TEO/TEO_CircuitoRC.html">
          <div class="entry-top"><span class="kind">TEO</span><span class="year">Anno 2</span></div>
          <div class="entry-title">Circuito RC</div>
          <div class="entry-desc">Circuito RC e risposta temporale.</div>
        </a>

        <a class="entry-card" data-kind="TEO" data-year="Anno 3" data-text="pid motor analisi motore controllo" href="Pagine/ELETTROTECNICA/TEO/TEO_PIDMotor.html">
          <div class="entry-top"><span class="kind">TEO</span><span class="year">Anno 3</span></div>
          <div class="entry-title">PID Motor</div>
          <div class="entry-desc">Analisi motore e controllo PID.</div>
        </a>
      </div>
    </div>

    <div class="box es" data-box="ES">
      <div class="section-head"><h3>Esercizi</h3><span>ES</span></div>
      <div class="item-grid">
        <div class="empty-slot">Spazio pronto da riempire</div>
      </div>
    </div>
  </section>
</div>

<script>
const searchInput = document.getElementById('search');
const yearFilter = document.getElementById('yearFilter');
const typeFilter = document.getElementById('typeFilter');
const cards = [...document.querySelectorAll('.entry-card')];
const boxes = [...document.querySelectorAll('.box')];

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  const year = yearFilter.value;
  const type = typeFilter.value;

  cards.forEach(card => {
    const matchesQuery = !query || card.dataset.text.toLowerCase().includes(query) || card.textContent.toLowerCase().includes(query);
    const matchesYear = !year || card.dataset.year === year;
    const matchesType = !type || card.dataset.kind === type;
    const show = matchesQuery && matchesYear && matchesType;
    card.classList.toggle('hidden', !show);
  });

  boxes.forEach(box => {
    const visibleCards = [...box.querySelectorAll('.entry-card:not(.hidden)')];
    const hasEmpty = box.querySelector('.empty-slot');
    box.classList.toggle('hidden', visibleCards.length === 0 && !hasEmpty);
  });
}

[searchInput, yearFilter, typeFilter].forEach(el => {
  el.addEventListener('input', applyFilters);
  el.addEventListener('change', applyFilters);
});
</script>
</body>
</html>
